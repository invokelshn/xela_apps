      function onRobotDescriptionMessage(msg, sourceName) {
        const src = state.urdfSources[sourceName];
        if (!src) return;
        const data = typeof msg?.data === "string" ? msg.data : "";
        if (!data || data === src.robotDescriptionXml) {
          return;
        }
        src.robotDescriptionXml = data;
        src.robotRootLink = parseUrdfRootLink(data);
        src.robotDescriptionVersion += 1;
        src.frameAliasCache.clear();
      }

      function onTfMessage(msg, isStatic, sourceName) {
        const src = state.urdfSources[sourceName];
        if (!src) return;
        const transforms = Array.isArray(msg?.transforms) ? msg.transforms : [];
        if (transforms.length === 0) return;
        const edgeMap = src.tfEdges;
        let structureChanged = false;
        for (const tr of transforms) {
          const child = normalizeFrameId(tr.child_frame_id);
          const parent = normalizeFrameId(tr.header?.frame_id);
          if (!child || !parent) continue;
          const prev = edgeMap.get(child);
          if (!prev || prev.parent !== parent) {
            structureChanged = true;
          }
          const t = tr.transform?.translation || {};
          const q = tr.transform?.rotation || {};
          edgeMap.set(child, {
            parent,
            tx: Number(t.x) || 0,
            ty: Number(t.y) || 0,
            tz: Number(t.z) || 0,
            qx: Number(q.x) || 0,
            qy: Number(q.y) || 0,
            qz: Number(q.z) || 0,
            qw: Number(q.w) || 1,
            static: !!isStatic,
          });
        }
        if (structureChanged) {
          src.frameAliasCache.clear();
        }
      }

      async function buildUrdfRobotFromDescription() {
        return urdfMeshRenderer.buildRobotFromDescription();
      }

      function autoFrameUrdfMeshCamera(force = false) {
        const m = state.urdfMesh;
        if (!m.ready || !m.robotBuilt) return;
        if (!force && m.autoFrameDone) return;

        const THREE = m.THREE;
        const box = new THREE.Box3();
        let hasVisible = false;
        for (const group of m.linkGroups.values()) {
          if (!group.visible) continue;
          box.expandByObject(group);
          hasVisible = true;
        }
        if (!hasVisible || box.isEmpty()) return;

        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);
        const radius = Math.max(size.length() * 0.45, 0.02);

        // In RobotModel mode, orbit around base projection on the world floor (z=0).
        if (state.uiMode === "robot") {
          const src = getActiveUrdfSource();
          const preferredBaseLinks = [
            normalizeFrameId(src?.robotRootLink || ""),
            "base_link",
            "base_link_inertia",
            "base",
            "base_footprint",
          ].filter((n, idx, arr) => n && arr.indexOf(n) === idx);
          let foundBase = false;
          for (const name of preferredBaseLinks) {
            const group = m.linkGroups.get(name);
            if (!group || !group.visible) continue;
            const basePos = new THREE.Vector3();
            group.getWorldPosition(basePos);
            center.set(basePos.x, basePos.y, 0.0);
            foundBase = true;
            break;
          }
          if (!foundBase) {
            center.set(0, 0, 0);
          }
        }

        m.controls.target.copy(center);
        m.camera.position.set(
          center.x + radius * 1.9,
          center.y - radius * 2.3,
          center.z + radius * 1.4,
        );
        m.camera.near = Math.max(radius / 1000.0, 0.0005);
        m.camera.far = Math.max(radius * 600.0, 20.0);
        m.camera.updateProjectionMatrix();
        applyOrbitProfileForMode();
        m.controls.update();
        m.autoFrameDone = true;
      }

      function resolveFrameToFixed(frame, fixedFrame, cache, visiting, allowLooseRoot = false) {
        const m = state.urdfMesh;
        const fixed = normalizeFrameId(fixedFrame);
        const rawFrame = normalizeFrameId(frame);
        if (!rawFrame) return null;
        const resolvedFrame = resolveChildFrameAlias(rawFrame) || rawFrame;
        if (resolvedFrame === fixed || rawFrame === fixed) {
          return { tx: 0, ty: 0, tz: 0, qx: 0, qy: 0, qz: 0, qw: 1 };
        }
        if (cache.has(resolvedFrame)) return cache.get(resolvedFrame);
        if (visiting.has(resolvedFrame)) return null;
        visiting.add(resolvedFrame);
        const edge = m.tfEdges.get(resolvedFrame);
        if (!edge) {
          visiting.delete(resolvedFrame);
          if (allowLooseRoot) {
            const isKnownGraphFrame = m.tfParentFrames.has(resolvedFrame) || m.tfEdges.has(resolvedFrame);
            if (!isKnownGraphFrame) {
              return null;
            }
            const root = { tx: 0, ty: 0, tz: 0, qx: 0, qy: 0, qz: 0, qw: 1 };
            cache.set(resolvedFrame, root);
            return root;
          }
          return null;
        }
        const parentTf = resolveFrameToFixed(edge.parent, fixed, cache, visiting, allowLooseRoot);
        visiting.delete(resolvedFrame);
        if (!parentTf) return null;

        const THREE = m.THREE;
        const parentQ = new THREE.Quaternion(parentTf.qx, parentTf.qy, parentTf.qz, parentTf.qw);
        const localQ = new THREE.Quaternion(edge.qx, edge.qy, edge.qz, edge.qw);
        const combinedQ = parentQ.clone().multiply(localQ);
        const localT = new THREE.Vector3(edge.tx, edge.ty, edge.tz).applyQuaternion(parentQ);
        const combinedT = localT.add(new THREE.Vector3(parentTf.tx, parentTf.ty, parentTf.tz));
        const out = {
          tx: combinedT.x,
          ty: combinedT.y,
          tz: combinedT.z,
          qx: combinedQ.x,
          qy: combinedQ.y,
          qz: combinedQ.z,
          qw: combinedQ.w,
        };
        cache.set(resolvedFrame, out);
        return out;
      }

      function updateRobotLinkTransforms(fixedFrame, allowLooseRootFallback = true) {
        const m = state.urdfMesh;
        if (!m.ready || !m.robotBuilt) return { total: 0, visibleCount: 0, missingCount: 0, fallbackVisibleCount: 0 };
        const parentFrames = new Set();
        for (const edge of m.tfEdges.values()) {
          if (edge.parent) parentFrames.add(normalizeFrameId(edge.parent));
        }
        m.tfParentFrames = parentFrames;
        const strictCache = new Map();
        const strictVisiting = new Set();
        const looseCache = new Map();
        const looseVisiting = new Set();
        let visibleCount = 0;
        let missingCount = 0;
        let fallbackVisibleCount = 0;
        for (const [linkName, group] of m.linkGroups.entries()) {
          let tf = resolveFrameToFixed(linkName, fixedFrame, strictCache, strictVisiting, false);
          let usedFallback = false;
          if (!tf && allowLooseRootFallback) {
            tf = resolveFrameToFixed(linkName, fixedFrame, looseCache, looseVisiting, true);
            usedFallback = !!tf;
          }
          if (!tf) {
            group.visible = false;
            missingCount += 1;
            continue;
          }
          group.visible = true;
          group.position.set(tf.tx, tf.ty, tf.tz);
          group.quaternion.set(tf.qx, tf.qy, tf.qz, tf.qw);
          visibleCount += 1;
          if (usedFallback) {
            fallbackVisibleCount += 1;
          }
        }
        const stats = {
          total: m.linkGroups.size,
          visibleCount,
          missingCount,
          fallbackVisibleCount,
        };
        m.lastTfStats = stats;
        m.tfFallbackActive = fallbackVisibleCount > 0;
        return stats;
      }

      function ensureMarkerObject(key) {
        const m = state.urdfMesh;
        const THREE = m.THREE;
        if (m.markerMap.has(key)) {
          return m.markerMap.get(key);
        }
        const group = new THREE.Group();
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.0026, 10, 10),
          new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.2, metalness: 0.0 }),
        );
        const arrow = new THREE.ArrowHelper(
          new THREE.Vector3(1, 0, 0),
          new THREE.Vector3(0, 0, 0),
          0.006,
          0xf8fafc,
          0.0024,
          0.0016,
        );
        group.add(sphere);
        group.add(arrow);
        m.markerGroup.add(group);
        const marker = { group, sphere, arrow };
        m.markerMap.set(key, marker);
        return marker;
      }

      function resolveMarkerPose(frameId, fixedFrame, strictCache, strictVisiting, looseCache, looseVisiting) {
        const frame = resolveChildFrameAlias(frameId) || normalizeFrameId(frameId);
        if (!frame) return null;
        let tf = resolveFrameToFixed(frame, fixedFrame, strictCache, strictVisiting, false);
        if (tf) return tf;
        return resolveFrameToFixed(frame, fixedFrame, looseCache, looseVisiting, true);
      }

      function updateUrdfMarkers(payload) {
        const m = state.urdfMesh;
        if (!m.ready) return;
        const points = (payload?.urdf?.points && Array.isArray(payload.urdf.points)) ? payload.urdf.points : [];
        const liveKeys = new Set();
        const xyRange = Math.max(1e-6, Number(payload?.meta?.xy_force_range) || 0.8);
        const zRange = Math.max(1e-6, Number(payload?.meta?.z_force_range) || 14.0);
        const xyArrowGain = 3.0;
        const fixedFrame = normalizeFrameId(m.fixedFrame || payload?.fixed_frame || defaultFixedFrame);
        const strictCache = new Map();
        const strictVisiting = new Set();
        const looseCache = new Map();
        const looseVisiting = new Set();

        for (const p of points) {
          const key = `${p.module}:${p.sensor_index}`;
          liveKeys.add(key);
          const marker = ensureMarkerObject(key);
          marker.group.visible = true;
          const tfPose = resolveMarkerPose(
            p.frame_id,
            fixedFrame,
            strictCache,
            strictVisiting,
            looseCache,
            looseVisiting,
          );
          if (tfPose) {
            marker.group.position.set(tfPose.tx, tfPose.ty, tfPose.tz);
            marker.group.quaternion.set(tfPose.qx, tfPose.qy, tfPose.qz, tfPose.qw);
          } else {
            marker.group.position.set(Number(p.x) || 0, Number(p.y) || 0, Number(p.z) || 0);
            marker.group.quaternion.set(0, 0, 0, 1);
          }

          const norm = Math.max(0, Math.min(1, Number(p.norm) || 0));
          const rgb = forceColorRgb(norm);
          marker.sphere.material.color.setRGB(rgb.r / 255, rgb.g / 255, rgb.b / 255);

          // Sidecar rendering convention: X axis is mirrored vs sensor stream.
          const fxRaw = -(Number(p.fx) || 0);
          const fyRaw = Number(p.fy) || 0;
          const fz = Number(p.fz) || 0;
          // URDF payload already contains module-wise sign normalization.
          const dir = new m.THREE.Vector3(
            (fxRaw / xyRange) * xyArrowGain,
            (fyRaw / xyRange) * xyArrowGain,
            fz / zRange,
          );
          const mag = dir.length();
          if (mag < 0.012) {
            marker.arrow.visible = false;
            continue;
          }
          marker.arrow.visible = true;
          dir.normalize();
          const length = clamp(0.004 + mag * 0.012, 0.004, 0.028);
          marker.arrow.setDirection(dir);
          marker.arrow.setLength(length, Math.min(0.006, length * 0.35), Math.min(0.004, length * 0.22));
          marker.arrow.setColor(new m.THREE.Color(0xf1f5f9));
        }

        for (const [key, marker] of m.markerMap.entries()) {
          if (!liveKeys.has(key)) {
            marker.group.visible = false;
          }
        }
      }

      async function renderUrdfMesh(payload) {
        const m = state.urdfMesh;
        if (!m.ready) return false;
        bindActiveUrdfSourceToMesh(false);
        resizeUrdfMeshRenderer();
        if (!m.robotBuilt && m.robotDescriptionXml) {
          await buildUrdfRobotFromDescription();
        }
        if (!m.robotBuilt) return false;

        const fixedFrame = selectFixedFrame(getActiveUrdfSource(), payload?.fixed_frame || m.fixedFrame || defaultFixedFrame);
        m.fixedFrame = fixedFrame || "world";
        const allowLooseRootFallback = state.uiMode !== "robot";
        const tfStats = updateRobotLinkTransforms(m.fixedFrame, allowLooseRootFallback);
        if (tfStats.total > 0 && tfStats.visibleCount === 0) {
          const activeSource = getActiveUrdfSource();
          m.failReason =
            `No link transforms resolved from ${activeSource.tfTopic} (fixed_frame=${m.fixedFrame}).`;
          return false;
        }
        autoFrameUrdfMeshCamera(false);
        updateUrdfMarkers(payload);
        updateFollowCamera(performance.now());

        m.controls.update();
        m.renderer.render(m.scene, m.camera);
        return true;
      }

      function updateSmoothedVectors(payload) {
        updateSmoothedVectorsCore(state, payload, 0.22, state.uiMode);
      }

      function drawArrow(x0, y0, dx, dy, lineWidth, color) {
        drawArrowCanvas(ctx, x0, y0, dx, dy, lineWidth, color);
      }

      function handleRosbridgeMessage(msg) {
        if (msg.op === "status" && String(msg.level || "").toLowerCase() === "error") {
          const statusText = String(msg.msg || "");
          if (statusText !== state.lastRosbridgeErrorText) {
            state.lastRosbridgeErrorText = statusText;
            console.warn("[xela-sidecar] rosbridge error:", statusText);
          }
          if (/infer topic type|unknown topic type/i.test(statusText)) {
            state.sourceTopicSubscribed = false;
            setTimeout(() => ensureSourceSubscriptions(), 200);
          }
          return;
        }

        if (msg.op === "service_response" && msg.service === "/xela_viz_mode_manager/set_mode") {
          state.pendingSwitch = false;
          if (msg.result && msg.values && msg.values.success) {
            setHintText(`Mode switch accepted: ${msg.values.message || ""}`);
          } else {
            const reason = msg.values && msg.values.message ? msg.values.message : "service call failed";
            setHintText(`Mode switch failed: ${reason}`);
          }
          return;
        }

        const hasServiceCallId = typeof msg.id === "string" && state.sourceByServiceCallId.has(msg.id);
        const sourceNameFromService = state.sourceByService.get(msg.service);
        if (msg.op === "service_response" && (hasServiceCallId || sourceNameFromService)) {
          const sourceName = hasServiceCallId
            ? state.sourceByServiceCallId.get(msg.id)
            : sourceNameFromService;
          if (hasServiceCallId) {
            state.sourceByServiceCallId.delete(msg.id);
          }
          const src = state.urdfSources[sourceName];
          if (src) {
            src.pendingRobotDescriptionService = false;
          }
          const values = Array.isArray(msg.values?.values) ? msg.values.values : [];
          if (values.length > 0) {
            const first = values[0];
            const xml = typeof first?.string_value === "string" ? first.string_value : "";
            if (xml) {
              onRobotDescriptionMessage({ data: xml }, sourceName);
            }
          }
          return;
        }

        for (const src of Object.values(state.urdfSources)) {
          if (msg.topic === src.robotDescriptionTopic && msg.msg) {
            onRobotDescriptionMessage(msg.msg, src.name);
            return;
          }
          if (msg.topic === src.tfTopic && msg.msg) {
            onTfMessage(msg.msg, false, src.name);
            return;
          }
          if (msg.topic === src.tfStaticTopic && msg.msg) {
            onTfMessage(msg.msg, true, src.name);
            return;
          }
        }

        if (msg.topic === topic && msg.msg) {
          const data = msg.msg.data;
          if (typeof data !== "string") return;
          try {
            state.payload = JSON.parse(data);
            state.lastReceivedMs = performance.now();
            const prevRequestedMode = state.requestedVizMode;
            state.requestedVizMode = String(state.payload?.meta?.requested_viz_mode || "grid").toLowerCase();
            state.sidecarRenderMode = String(state.payload?.meta?.sidecar_render_mode || "grid-2d");
            state.modelName = String(state.payload?.meta?.model_name || "");
            if (!state.modeOverriddenByUser) {
              state.uiMode = state.requestedVizMode === "urdf" ? "xela" : "grid";
            }
            if (state.uiMode !== "grid" && state.requestedVizMode === "urdf" && prevRequestedMode !== "urdf") {
              resetUrdfCamera();
              requestRobotDescriptionViaService(getUrdfSourceForUiMode(), true);
            }
            updateSmoothedVectors(state.payload);
            updateModeButtons();
          } catch (_) {
          }
        }
      }
      const rosbridgeClient = createRosbridgeClient({
        state,
        wsCandidates,
        topicInfoEl: topicInfo,
        topicInfoTextFor: (activeWsUrl) =>
          `${topic} | xela:${xelaTfTopic} robot:${robotTfTopic} via ${activeWsUrl || wsCandidates.join(" | ")}`,
        setStatus,
        onOpen: () => {
          state.sourceTopicSubscribed = false;
          for (const src of Object.values(state.urdfSources)) {
            src.pendingRobotDescriptionService = false;
          }
          ensureSourceSubscriptions();
          requestRobotDescriptionViaService("xela", true);
          requestRobotDescriptionViaService("robot", true);
          updateModeButtons();
        },
        onCloseOpened: () => {
          state.pendingSwitch = false;
          setStatus("Disconnected", false);
        },
        onErrorOpened: () => {
          setStatus("Socket error", false);
        },
        onMessageParsed: handleRosbridgeMessage,
      });

      function connect(candidateIndex = 0) {
        rosbridgeClient.connect(candidateIndex);
      }

      window.addEventListener("error", (event) => {
        const detail = event?.message || "Unknown script error";
        console.error("[xela-sidecar] window error:", event);
        setHintText(`Web error: ${detail}`);
      });
      window.addEventListener("unhandledrejection", (event) => {
        const detail = safeErrorText(event?.reason);
        console.error("[xela-sidecar] unhandled rejection:", event?.reason);
        setHintText(`Web promise error: ${detail}`);
      });

      function requestModeSwitch(toUrdf) {
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
          setHintText("Cannot switch mode: websocket disconnected.");
          return;
        }
        if (state.pendingSwitch) {
          setHintText("Mode switch already in progress.");
          return;
        }
        const target = toUrdf ? "urdf" : "grid";
        state.pendingSwitch = true;
        state.requestedVizMode = target;
        updateModeButtons();
        setHintText(`Switching viz_mode to ${target}...`);
        state.ws.send(JSON.stringify({
          op: "call_service",
          service: "/xela_viz_mode_manager/set_mode",
          type: "std_srvs/srv/SetBool",
          args: { data: !!toUrdf },
        }));
      }

      function setUiMode(newMode) {
        if (!["grid", "xela", "robot"].includes(newMode)) {
          return;
        }
        state.modeOverriddenByUser = true;
        const previous = state.uiMode;
        state.uiMode = newMode;
        updateModeButtons();
        if (previous !== newMode) {
          resetUrdfCamera();
        }
        applyOrbitProfileForMode();
        if (newMode === "grid") {
          requestModeSwitch(false);
          return;
        }
        bindActiveUrdfSourceToMesh(true);
        requestRobotDescriptionViaService(getUrdfSourceForUiMode(), false);
        requestModeSwitch(true);
      }

      function drawEmpty(text) {
        ctx.fillStyle = "#0b1222";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#93a4bf";
        ctx.font = `${Math.max(12, Math.floor(canvas.height * 0.03))}px monospace`;
        ctx.textAlign = "center";
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      }

      function drawGrid(payload) {
        drawGridMode({
          payload,
          ctx,
          canvas,
          state,
          forceColor,
          drawArrow,
          drawEmpty,
        });
      }

      function buildUrdfDisplayPoints(rawPoints, rows, cols, cellSize) {
        const moduleBuckets = new Map();
        for (const p of rawPoints) {
          const moduleName = p.module || "module";
          if (!moduleBuckets.has(moduleName)) {
            moduleBuckets.set(moduleName, []);
          }
          moduleBuckets.get(moduleName).push(p);
        }

        const preferred = ["left", "right"];
        const names = [...moduleBuckets.keys()].sort((a, b) => {
          const ai = preferred.indexOf(a);
          const bi = preferred.indexOf(b);
          if (ai >= 0 && bi >= 0) return ai - bi;
          if (ai >= 0) return -1;
          if (bi >= 0) return 1;
          return a.localeCompare(b);
        });

        const safeRows = Math.max(1, rows);
        const safeCols = Math.max(1, cols);
        const pitch = Math.max(0.006, cellSize);
        const moduleWidth = safeCols * pitch;
        const moduleGap = Math.max(0.03, pitch * 2.2);

        const laidOut = [];
        let cursorX = 0;
        for (let i = 0; i < names.length; i++) {
          const name = names[i];
          if (i > 0) {
            cursorX += moduleWidth + moduleGap;
          }

          const pts = moduleBuckets.get(name);
          for (const p of pts) {
            const idx = Math.max(0, Number(p.sensor_index) || 0);
            const row = Math.min(safeRows - 1, Math.floor(idx / safeCols));
            const col = Math.min(safeCols - 1, idx % safeCols);
            let lx = (col - (safeCols - 1) * 0.5) * pitch;
            let ly = ((safeRows - 1) * 0.5 - row) * pitch;
            if (name === "right") {
              // Rotate the right module 180 degrees on the flat display plane.
              lx = -lx;
              ly = -ly;
            }
            laidOut.push({
              ...p,
              x: cursorX + lx,
              y: ly,
              z: 0.0,
            });
          }
        }

        if (!laidOut.length) {
          return laidOut;
        }

        let minX = Number.POSITIVE_INFINITY;
        let maxX = Number.NEGATIVE_INFINITY;
        for (const p of laidOut) {
          minX = Math.min(minX, p.x);
          maxX = Math.max(maxX, p.x);
        }
        const centerX = (minX + maxX) * 0.5;
        for (const p of laidOut) {
          p.x -= centerX;
        }

        return laidOut;
      }

      function buildUrdfScene(payload) {
        const rawPoints = (payload.urdf && payload.urdf.points) || [];
        if (!rawPoints.length) {
          return null;
        }
        const rows = Math.max(1, Number(payload.grid?.rows) || 4);
        const cols = Math.max(1, Number(payload.grid?.cols) || 6);
        const cellSize = Math.max(0.006, Number(payload.grid?.cell_size) || 0.015);
        const points = buildUrdfDisplayPoints(rawPoints, rows, cols, cellSize);

        let cx = 0;
        let cy = 0;
        let cz = 0;
        let minX = Number.POSITIVE_INFINITY;
        let maxX = Number.NEGATIVE_INFINITY;
        let minY = Number.POSITIVE_INFINITY;
        let maxY = Number.NEGATIVE_INFINITY;
        let minZ = Number.POSITIVE_INFINITY;
        let maxZ = Number.NEGATIVE_INFINITY;

        const modules = new Map();
        for (const p of points) {
          cx += p.x;
          cy += p.y;
          cz += p.z;
          minX = Math.min(minX, p.x);
          maxX = Math.max(maxX, p.x);
          minY = Math.min(minY, p.y);
          maxY = Math.max(maxY, p.y);
          minZ = Math.min(minZ, p.z);
          maxZ = Math.max(maxZ, p.z);

          const name = p.module || "module";
          if (!modules.has(name)) {
            modules.set(name, new Map());
          }
          modules.get(name).set(Number(p.sensor_index), p);
        }

        const n = Math.max(1, points.length);
        cx /= n;
        cy /= n;
        cz /= n;

        const span = Math.max(maxX - minX, maxY - minY, maxZ - minZ, 0.04);
        state.lastSceneExtent = span;

        return {
          points,
          modules,
          center: { x: cx, y: cy, z: cz },
          rows: Math.max(2, Number(payload.grid?.rows) || 4),
          cols: Math.max(2, Number(payload.grid?.cols) || 6),
          span,
        };
      }

      function projectWorld(point, scene) {
        const cam = state.camera;
        const relX = (point.x - scene.center.x) + cam.panX;
        const relY = (point.y - scene.center.y) + cam.panY;
        const relZ = (point.z - scene.center.z);

        const cy = Math.cos(cam.yaw);
        const sy = Math.sin(cam.yaw);
        const cp = Math.cos(cam.pitch);
        const sp = Math.sin(cam.pitch);

        const x1 = cy * relX - sy * relY;
        const y1 = sy * relX + cy * relY;
        const z1 = relZ;

        const x2 = x1;
        const y2 = cp * y1 - sp * z1;
        const z2 = sp * y1 + cp * z1;

        const cameraDist = scene.span * 4.0 + 0.18;
        const depth = Math.max(0.05, cameraDist - z2);
        const persp = cameraDist / depth;
        const base = (Math.min(canvas.width, canvas.height) * 0.43 * cam.zoom) / Math.max(scene.span, 1e-4);
        const px = canvas.width * 0.5 + x2 * base * persp;
        const py = canvas.height * 0.5 - y2 * base * persp;

        return { x: px, y: py, z: z2, persp };
      }

      function drawUrdfFixed3D(payload) {
        const scene = buildUrdfScene(payload);
        if (!scene) {
          drawEmpty("URDF mode requested, but urdf.points is empty");
          return false;
        }

        ctx.fillStyle = "#0a1222";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const projectMap = new Map();
        for (const p of scene.points) {
          const key = `${p.module}:${p.sensor_index}`;
          projectMap.set(key, projectWorld(p, scene));
        }

        const tris = [];
        for (const [moduleName, moduleMap] of scene.modules.entries()) {
          for (let r = 0; r < scene.rows - 1; r++) {
            for (let c = 0; c < scene.cols - 1; c++) {
              const i00 = r * scene.cols + c;
              const i01 = r * scene.cols + c + 1;
              const i10 = (r + 1) * scene.cols + c;
              const i11 = (r + 1) * scene.cols + c + 1;

              const p00 = moduleMap.get(i00);
              const p01 = moduleMap.get(i01);
              const p10 = moduleMap.get(i10);
              const p11 = moduleMap.get(i11);
              if (!p00 || !p01 || !p10 || !p11) continue;

              const t1 = [p00, p01, p10];
              const t2 = [p10, p01, p11];
              for (const tri of [t1, t2]) {
                const proj = tri.map((p) => projectMap.get(`${p.module}:${p.sensor_index}`));
                const depth = (proj[0].z + proj[1].z + proj[2].z) / 3.0;
                tris.push({ moduleName, proj, depth });
              }
            }
          }
        }

        tris.sort((a, b) => a.depth - b.depth);
        for (const tri of tris) {
          const [a, b, c] = tri.proj;
          const fill = tri.moduleName === "left" ? "rgba(56,189,248,0.15)" : "rgba(20,184,166,0.15)";
          ctx.fillStyle = fill;
          ctx.strokeStyle = "rgba(148,163,184,0.22)";
          ctx.lineWidth = 1.0;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.lineTo(c.x, c.y);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }

        const zRange = Math.max(1e-6, Number(payload.meta?.z_force_range) || 14.0);
        const xyRange = Math.max(1e-6, Number(payload.meta?.xy_force_range) || 0.8);
        for (const p of scene.points) {
          const key = `${p.module}:${p.sensor_index}`;
          const proj = projectMap.get(key);
          if (!proj) continue;

          const radius = clamp(3.0 * proj.persp, 2.2, 7.6);
          ctx.beginPath();
          ctx.fillStyle = forceColor(Number(p.norm) || 0);
          ctx.strokeStyle = "rgba(6,10,18,0.95)";
          ctx.lineWidth = 1.0;
          ctx.arc(proj.x, proj.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          const v = state.vectorEma.get(key) || { fx: Number(p.fx) || 0, fy: Number(p.fy) || 0 };
          const mag = Math.hypot(v.fx, v.fy);
          const nxy = mag / xyRange;
          if (nxy < 0.08) continue;

          const fxDisplay = -v.fx;
          const fyDisplay = (p.module === "left") ? -v.fy : v.fy;
          const q = {
            x: Number(p.x) + (fxDisplay / xyRange) * scene.span * 0.24,
            y: Number(p.y) + (fyDisplay / xyRange) * scene.span * 0.24,
            z: Number(p.z) + (Number(p.fz || 0) / zRange) * scene.span * 0.14,
          };
          const qProj = projectWorld(q, scene);
          drawArrow(
            proj.x,
            proj.y,
            qProj.x - proj.x,
            qProj.y - proj.y,
            clamp(1.0 * proj.persp, 1.0, 2.2),
            "rgba(241,245,249,0.88)",
          );
        }

        return true;
      }

      function render() {
        resizeCanvas();
        const wantsUrdfView = state.uiMode !== "grid";
        const activeSource = getActiveUrdfSource();

        if (!state.payload) {
          if (wantsUrdfView) {
            bindActiveUrdfSourceToMesh(false);
            if (!state.urdfMesh.ready && !state.urdfMesh.loading && !state.urdfMesh.failed) {
              ensureUrdfMeshRuntime().catch(() => {});
            }
            if (state.urdfMesh.ready) {
              const dummyPayload = {
                fixed_frame: state.urdfMesh.fixedFrame || defaultFixedFrame,
                urdf: { points: [] },
                meta: { xy_force_range: 0.8, z_force_range: 14.0 },
              };
              runUrdfRenderGuarded(dummyPayload, (okRender) => {
                if (okRender) {
                  setUrdf3DVisible(true);
                  setHintText("URDF mesh is ready. Waiting for /x_taxel_2f/web_state sensor payload.");
                  setModeInfoText(`Sidecar: ${state.uiMode === "robot" ? "RobotModel" : "XelaModel"} | waiting payload`);
                } else {
                  setUrdf3DVisible(false);
                  drawEmpty("URDF mesh mode waiting for robot_description/tf");
                  if (state.urdfMesh.failReason) {
                    setHintText(`URDF mesh pending: ${state.urdfMesh.failReason}`);
                    setModeInfoText(`Sidecar: ${state.uiMode === "robot" ? "RobotModel" : "XelaModel"} pending (tf)`);
                  } else {
                    setHintText(`Waiting for ${activeSource.robotDescriptionTopic} and ${activeSource.tfTopic}.`);
                    setModeInfoText(`Sidecar: ${state.uiMode === "robot" ? "RobotModel" : "XelaModel"} pending`);
                  }
                }
              });
            } else {
              setUrdf3DVisible(false);
              drawEmpty("Initializing URDF mesh renderer...");
              if (state.urdfMesh.failed) {
                setHintText(`URDF mesh init failed: ${state.urdfMesh.failReason || "unknown"}`);
                setModeInfoText("Sidecar: URDF mesh failed");
              } else {
                setHintText("Initializing URDF mesh renderer...");
                setModeInfoText("Sidecar: URDF init");
              }
            }
          } else {
            bumpUrdfRenderEpoch();
            setUrdf3DVisible(false);
            drawEmpty("Waiting for /x_taxel_2f/web_state ...");
            setHintText("No payload received yet. Check bridge launch and rosbridge connection.");
            setModeInfoText("Sidecar: GridMode");
          }
          updateModeButtons();
        } else {
          const modelLabel = state.modelName ? ` model=${state.modelName}` : "";
          if (wantsUrdfView) {
            bindActiveUrdfSourceToMesh(false);
            if (!state.urdfMesh.robotDescriptionXml) {
              requestRobotDescriptionViaService(activeSource.name, false);
            }
            if (state.urdfMesh.ready) {
              runUrdfRenderGuarded(state.payload, (okRender) => {
                if (!okRender) {
                  const nowMs = performance.now();
                  if (state.urdf3dVisible) {
                    if (state.urdfRenderFailSinceMs <= 0.0) {
                      state.urdfRenderFailSinceMs = nowMs;
                    }
                    const failAgeMs = nowMs - state.urdfRenderFailSinceMs;
                    if (failAgeMs < urdfFailGraceMs) {
                      setHintText("URDF Mesh 3D: transient TF/render drop, holding last frame.");
                      return;
                    }
                  } else {
                    state.urdfRenderFailSinceMs = nowMs;
                  }
                  setUrdf3DVisible(false);
                  drawEmpty("URDF mesh mode waiting for robot_description/tf");
                  if (state.urdfMesh.failReason) {
                    setHintText(`URDF mesh pending: ${state.urdfMesh.failReason}`);
                    setModeInfoText(`Sidecar: ${state.uiMode === "robot" ? "RobotModel" : "XelaModel"} pending (tf)${modelLabel}`);
                  } else {
                    setHintText(`URDF mesh pending: waiting for ${activeSource.robotDescriptionTopic} and ${activeSource.tfTopic}.`);
                    setModeInfoText(`Sidecar: ${state.uiMode === "robot" ? "RobotModel" : "XelaModel"} pending${modelLabel}`);
                  }
                  return;
                }
                state.urdfRenderFailSinceMs = 0.0;
                setUrdf3DVisible(true);
                if (state.urdfMesh.tfFallbackActive) {
                  setHintText("URDF Mesh 3D (local TF root fallback): fixed_frame chain not fully available.");
                } else {
                  setHintText(`URDF Mesh 3D: ${activeSource.robotDescriptionTopic} + ${activeSource.tfTopic}`);
                }
                setModeInfoText(`Sidecar: ${state.uiMode === "robot" ? "RobotModel" : "XelaModel"}${modelLabel}`);
              });
            } else {
              if (!state.urdfMesh.loading && !state.urdfMesh.failed) {
                ensureUrdfMeshRuntime().catch(() => {});
              }
              setUrdf3DVisible(false);
              drawEmpty("Initializing URDF mesh renderer...");
              if (state.urdfMesh.failed) {
                const reason = state.urdfMesh.failReason || "unknown";
                setHintText(`URDF mesh init failed: ${reason}`);
                setModeInfoText(`Sidecar: ${state.uiMode === "robot" ? "RobotModel" : "XelaModel"} failed${modelLabel}`);
              } else {
                setHintText("Initializing URDF mesh renderer...");
                setModeInfoText(`Sidecar: ${state.uiMode === "robot" ? "RobotModel" : "XelaModel"} init${modelLabel}`);
              }
            }
          } else {
            bumpUrdfRenderEpoch();
            setUrdf3DVisible(false);
            drawGrid(state.payload);
            setHintText("Grid 2D mode.");
            setModeInfoText(`Sidecar: GridMode${modelLabel}`);
          }
        }

        const nowMs = performance.now();
        const timelineNowMs = getTimelineNowMs(nowMs);
        if ((nowMs - state.lastStatsPaintMs) >= 120) {
          const ageMsRaw = state.lastReceivedMs > 0 ? (nowMs - state.lastReceivedMs) : NaN;
          const ageMs = Number.isFinite(ageMsRaw) ? Math.round(ageMsRaw / 50) * 50 : NaN;
          const gridCount = state.payload?.grid?.points?.length || 0;
          const urdfCount = state.payload?.urdf?.points?.length || 0;
          const modeCount = wantsUrdfView ? `urdf=${urdfCount}` : `grid=${gridCount}`;
          const grasp = resolveGraspTelemetry(state.payload);
          const graspEvent = state.payload?.meta?.grasp_event;
          const graspFz = Number(grasp?.force?.fz);
          const graspFt = Number(grasp?.force?.ft);
          const graspDir = Number(grasp?.force?.dir_deg);
          const graspTotal = Number(grasp?.force?.total);
          const graspSigma = Number(grasp?.point?.sigma);
          const graspSparse = Number(Boolean(grasp?.flags?.point_sparse));
          const graspEventName = typeof graspEvent?.event === "string" ? graspEvent.event : "";
          const graspEventMode = typeof graspEvent?.mode === "string" ? graspEvent.mode : "";
          const graspEventReason = typeof graspEvent?.reason === "string" ? graspEvent.reason : "";
          const graspEventAgeMs = Number(state.payload?.meta?.grasp_event_age_ms);
          const graspPhase = resolveTelemetryPhase(grasp, graspEvent);
          sampleTimeline(grasp, timelineNowMs);
          const newMarker = registerEvent(grasp, graspEvent, timelineNowMs, graspEventAgeMs);
          drawSparkline(timelineNowMs);
          updateContactBadge(newMarker, timelineNowMs);

          const fzCurrent = computeGridFzCurrent(state.payload);
          const nextStatsCurrent =
            `${Number.isFinite(graspTotal) ? `fz_total=${graspTotal.toFixed(3)}` : ""}` +
            `${Number.isFinite(fzCurrent.left) ? ` L=${fzCurrent.left.toFixed(3)}` : ""}` +
            `${Number.isFinite(fzCurrent.right) ? ` R=${fzCurrent.right.toFixed(3)}` : ""}` +
            `${Number.isFinite(graspSigma) ? ` sigma_peak=${graspSigma.toFixed(2)}` : ""}` +
            `${graspPhase ? ` phase=${graspPhase}` : ""}`;
          if (nextStatsCurrent !== lastStatsCurrentText) {
            const trimmedCurrent = nextStatsCurrent.trim();
            statsCurrent.textContent = trimmedCurrent;
            statsCurrent.title = trimmedCurrent;
            lastStatsCurrentText = nextStatsCurrent;
          }
          const nextStats = Number.isFinite(ageMs)
            ? `age=${ageMs.toFixed(0)}ms ${modeCount} ui=${state.uiMode} src=${activeSource.name}` +
              `${Number.isFinite(graspFz) ? ` fz=${graspFz.toFixed(3)}` : ""}` +
              `${Number.isFinite(graspFt) ? ` ft=${graspFt.toFixed(3)}` : ""}` +
              `${Number.isFinite(graspDir) ? ` dir=${graspDir.toFixed(1)}deg` : ""}` +
              `${Number.isFinite(graspSigma) ? ` point_sigma=${graspSigma.toFixed(2)}` : ""}` +
              `${grasp ? ` point_sparse=${Math.round(graspSparse)}` : ""}` +
              `${graspPhase ? ` phase=${graspPhase}` : ""}` +
              `${graspEventName ? ` evt=${graspEventName}` : ""}` +
              `${graspEventMode ? ` mode=${graspEventMode}` : ""}` +
              `${graspEventReason ? ` reason=${graspEventReason}` : ""}`
            : `${modeCount} ui=${state.uiMode} src=${activeSource.name}` +
              `${Number.isFinite(graspFz) ? ` fz=${graspFz.toFixed(3)}` : ""}` +
              `${Number.isFinite(graspFt) ? ` ft=${graspFt.toFixed(3)}` : ""}` +
              `${Number.isFinite(graspDir) ? ` dir=${graspDir.toFixed(1)}deg` : ""}` +
              `${Number.isFinite(graspSigma) ? ` point_sigma=${graspSigma.toFixed(2)}` : ""}` +
              `${grasp ? ` point_sparse=${Math.round(graspSparse)}` : ""}` +
              `${graspPhase ? ` phase=${graspPhase}` : ""}` +
              `${graspEventName ? ` evt=${graspEventName}` : ""}` +
              `${graspEventMode ? ` mode=${graspEventMode}` : ""}` +
              `${graspEventReason ? ` reason=${graspEventReason}` : ""}`;
          if (nextStats !== state.lastStatsText) {
            statsText.textContent = nextStats;
            statsText.title = nextStats;
            state.lastStatsText = nextStats;
          }
          state.lastStatsPaintMs = nowMs;
        }

        requestAnimationFrame(render);
      }

      function resetUrdfCamera() {
        state.camera.yaw = 0.0;
        state.camera.pitch = 0.0;
        state.camera.zoom = 1.35;
        state.camera.panX = 0.0;
        state.camera.panY = 0.0;
      }

      reconnectBtn.addEventListener("click", () => {
        connect();
      });
      gridBtn.addEventListener("click", () => setUiMode("grid"));
      xelaBtn.addEventListener("click", () => setUiMode("xela"));
      robotBtn.addEventListener("click", () => setUiMode("robot"));
      followBtn?.addEventListener("click", () => {
        if (state.uiMode !== "robot") {
          return;
        }
        setFollowCamEnabled(!followCamState.enabled);
      });
      analysisBtn.addEventListener("click", () => setAnalysisVisible(!analysisState.visible));
      win10Btn.addEventListener("click", () => setTimelineWindowMs(10000));
      win30Btn.addEventListener("click", () => setTimelineWindowMs(30000));
      win60Btn.addEventListener("click", () => setTimelineWindowMs(60000));
      pauseBtn?.addEventListener("click", () => setTimelinePaused(!timelineState.paused, performance.now()));
      sparkline?.addEventListener("mousemove", (ev) => {
        const rect = sparkline.getBoundingClientRect();
        hoverState.inside = true;
        hoverState.x = ev.clientX - rect.left;
        hoverState.y = ev.clientY - rect.top;
        hoverState.clientX = ev.clientX;
        hoverState.clientY = ev.clientY;
        updateEventTooltip(performance.now());
      });
      sparkline?.addEventListener("mouseleave", () => {
        hoverState.inside = false;
        hoverState.clientX = 0;
        hoverState.clientY = 0;
        setEventTooltipVisible(false);
      });

      canvas.addEventListener("contextmenu", (ev) => ev.preventDefault());
      canvas.addEventListener("pointerdown", (ev) => {
        if (state.uiMode === "grid") return;
        state.drag = {
          id: ev.pointerId,
          x: ev.clientX,
          y: ev.clientY,
          yaw: state.camera.yaw,
          pitch: state.camera.pitch,
          panX: state.camera.panX,
          panY: state.camera.panY,
          panMode: ev.shiftKey || ev.button === 2,
        };
        canvas.setPointerCapture(ev.pointerId);
      });
      canvas.addEventListener("pointermove", (ev) => {
        if (!state.drag || state.drag.id !== ev.pointerId || state.uiMode === "grid") return;
        const dx = ev.clientX - state.drag.x;
        const dy = ev.clientY - state.drag.y;
        if (state.drag.panMode) {
          const k = (state.lastSceneExtent * 0.0022) / Math.max(0.25, state.camera.zoom);
          state.camera.panX = state.drag.panX + dx * k;
          state.camera.panY = state.drag.panY - dy * k;
          return;
        }
        state.camera.yaw = state.drag.yaw + dx * 0.008;
        state.camera.pitch = clamp(state.drag.pitch + dy * 0.006, -1.45, 1.45);
      });
      canvas.addEventListener("pointerup", (ev) => {
        if (state.drag && state.drag.id === ev.pointerId) {
          state.drag = null;
          canvas.releasePointerCapture(ev.pointerId);
        }
      });
      canvas.addEventListener("pointercancel", () => {
        state.drag = null;
      });
      canvas.addEventListener("wheel", (ev) => {
        if (state.uiMode === "grid") return;
        ev.preventDefault();
        const k = Math.exp(-ev.deltaY * 0.0012);
        state.camera.zoom = clamp(state.camera.zoom * k, 0.4, 3.6);
      }, { passive: false });
      canvas.addEventListener("dblclick", () => {
        if (state.uiMode === "grid") return;
        resetUrdfCamera();
      });

      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("resize", resizeUrdfMeshRenderer);
      connect();
      render();

      setStatus("Connecting...", false);
      statusLine.title =
        `topic=${topic} xela_desc=${xelaRobotDescriptionTopic} xela_tf=${xelaTfTopic} ` +
        `robot_desc=${robotRobotDescriptionTopic} robot_tf=${robotTfTopic} ws_candidates=${wsCandidates.join(",")}`;
    })();
  </script>
</body>
</html>
