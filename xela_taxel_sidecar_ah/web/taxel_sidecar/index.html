<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Xela Taxel Sidecar</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #334155;
      --txt: #e5e7eb;
      --muted: #93a4bf;
      --ok: #22c55e;
      --bad: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(1200px 700px at 20% 10%, #182641 0%, var(--bg) 55%);
      color: var(--txt);
      font-family: "Roboto Mono", "Fira Code", "Consolas", monospace;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr);
      width: 100%;
      height: 100%;
      gap: 10px;
      padding: 12px;
    }

    .toolbar {
      display: grid;
      align-items: center;
      gap: 10px;
      background: color-mix(in oklab, var(--panel) 84%, black);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }

    .status-toolbar {
      grid-template-columns: minmax(240px, 360px) minmax(140px, 220px) minmax(260px, 1fr);
    }

    .control-toolbar {
      grid-template-columns: minmax(180px, 260px) auto auto auto auto auto;
      justify-content: start;
    }

    .status-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 240px;
      max-width: 360px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--bad);
      box-shadow: 0 0 12px color-mix(in oklab, var(--bad) 70%, transparent);
    }

    .dot.ok {
      background: var(--ok);
      box-shadow: 0 0 12px color-mix(in oklab, var(--ok) 75%, transparent);
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #1f2937;
      color: var(--txt);
      padding: 7px 11px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover {
      background: #2a3647;
    }

    .mode-btn.active {
      border-color: #0ea5e9;
      background: #0f2f44;
      color: #e2f2fb;
    }

    .mini {
      font-size: 12px;
      color: var(--muted);
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1222;
      white-space: nowrap;
    }

    #modeInfo {
      min-width: 190px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .module-toolbar {
      grid-template-columns: auto repeat(5, auto);
      justify-content: start;
      gap: 15px;
      padding: 6px 12px;
      margin-top: -5px;
    }

    .module-toolbar label {
      font-size: 13px;
      color: var(--txt);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .module-toolbar input {
      accent-color: #0ea5e9;
      cursor: pointer;
    }

    #briefStats {
      min-width: 180px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    #topicInfo {
      min-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats-row {
      display: block;
      padding: 8px 10px;
      grid-row: 4;
    }

    #stats {
      position: relative;
      min-width: 0;
      width: 100%;
      text-align: left;
      font-variant-numeric: tabular-nums;
      white-space: normal;
      overflow: hidden;
    }

    .stats-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      min-width: 0;
      overflow: hidden;
    }

    .stats-scales {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      margin-right: 4px;
    }

    .scale-btn {
      padding: 4px 8px;
      font-size: 11px;
    }

    #statsText {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #statsCurrent {
      flex: 0 0 240px;
      max-width: min(34%, 240px);
      color: #cbd5e1;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-left: auto;
      margin-right: 6px;
    }

    #followDebug {
      flex: 0 1 520px;
      color: #a5b4cf;
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sparkline {
      display: block;
      width: 100%;
      height: 34px;
      border-radius: 6px;
      background: #0a1627;
      border: 1px solid #1b2a3f;
    }

    .event-tooltip {
      position: absolute;
      pointer-events: none;
      z-index: 6;
      display: none;
      max-width: min(420px, 80vw);
      white-space: pre-line;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #3b475d;
      background: color-mix(in oklab, #0b1222 88%, black);
      color: #dbeafe;
      font-size: 11px;
      line-height: 1.25;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }

    .viz {
      grid-row: 5;
      position: relative;
      height: 100%;
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(180deg, #0d1729 0%, #0b1221 100%);
      overflow: hidden;
    }

    .urdf3d-layer {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 1;
      background: #0a1222;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .legend {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 180px;
      background: color-mix(in oklab, #0b1222 75%, black);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      backdrop-filter: blur(2px);
      z-index: 3;
      pointer-events: none;
    }

    .legend h4 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .scale {
      width: 100%;
      height: 8px;
      border-radius: 5px;
      background: linear-gradient(90deg, #3b82f6 0%, #f97316 55%, #ef4444 100%);
      border: 1px solid color-mix(in oklab, var(--line) 65%, transparent);
    }

    .scale-label {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
    }

    .hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      color: var(--muted);
      font-size: 11px;
      background: color-mix(in oklab, #0b1222 75%, black);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      max-width: 62%;
      z-index: 3;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="toolbar status-toolbar">
      <div class="status-wrap">
        <div class="status" id="statusLine">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Disconnected</span>
        </div>
        <button id="reconnectBtn">Reconnect</button>
      </div>
      <div class="mini" id="briefStats">No data</div>
      <div class="mini" id="topicInfo"></div>
    </div>
    <div class="toolbar control-toolbar">
      <div class="mini" id="modeInfo">Sidecar: Grid 2D</div>
      <button class="mode-btn" id="gridBtn">GridMode</button>
      <button class="mode-btn" id="xelaBtn">XelaModel</button>
      <button class="mode-btn" id="robotBtn">RobotModel</button>
      <button class="mode-btn" id="followBtn" style="display: none;">FollowCam</button>
      <button class="mode-btn" id="analysisBtn" style="display: none;">Analysis</button>
    </div>
    <div class="toolbar module-toolbar" style="grid-template-columns: repeat(3, minmax(0, 1fr));">
      <div style="grid-column: 1 / -1; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">

        <div style="display: flex; flex-direction: column; gap: 4px;">
          <label style="font-weight:bold;"><input type="checkbox" id="chkIndex" checked> Thumb (0)</label>
          <div style="display: flex; gap: 6px; padding-left: 10px;">
            <label><input type="checkbox" id="chkM01" checked> 01</label>
            <label><input type="checkbox" id="chkM02" checked> 02</label>
            <label><input type="checkbox" id="chkM03" checked> 03</label>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 4px;">
          <label style="font-weight:bold;"><input type="checkbox" id="chkMiddle" checked> Index (1)</label>
          <div style="display: flex; gap: 6px; padding-left: 10px;">
            <label><input type="checkbox" id="chkM10" checked> 10</label>
            <label><input type="checkbox" id="chkM11" checked> 11</label>
            <label><input type="checkbox" id="chkM12" checked> 12</label>
            <label><input type="checkbox" id="chkM13" checked> 13</label>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 4px;">
          <label style="font-weight:bold;"><input type="checkbox" id="chkRing" checked> Middle (2)</label>
          <div style="display: flex; gap: 6px; padding-left: 10px;">
            <label><input type="checkbox" id="chkM20" checked> 20</label>
            <label><input type="checkbox" id="chkM21" checked> 21</label>
            <label><input type="checkbox" id="chkM22" checked> 22</label>
            <label><input type="checkbox" id="chkM23" checked> 23</label>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 4px;">
          <label style="font-weight:bold;"><input type="checkbox" id="chkThumb" checked> Ring (3)</label>
          <div style="display: flex; gap: 6px; padding-left: 10px;">
            <label><input type="checkbox" id="chkM30" checked> 30</label>
            <label><input type="checkbox" id="chkM31" checked> 31</label>
            <label><input type="checkbox" id="chkM32" checked> 32</label>
            <label><input type="checkbox" id="chkM33" checked> 33</label>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 4px;">
          <label style="font-weight:bold;"><input type="checkbox" id="chkPalm" checked> Palm (5)</label>
          <div style="display: flex; gap: 6px; padding-left: 10px;">
            <label><input type="checkbox" id="chkM51" checked> 51</label>
            <label><input type="checkbox" id="chkM52" checked> 52</label>
            <label><input type="checkbox" id="chkM53" checked> 53</label>
          </div>
        </div>

      </div>
    </div>

    <div class="toolbar stats-row" id="statsRow">
      <div class="mini" id="stats">
        <div class="stats-top">
          <div class="stats-scales">
            <button class="mode-btn scale-btn" id="win10Btn">10s</button>
            <button class="mode-btn scale-btn active" id="win30Btn">30s</button>
            <button class="mode-btn scale-btn" id="win60Btn">60s</button>
            <button class="mode-btn scale-btn" id="pauseBtn">Pause</button>
          </div>
          <span id="statsText">No data</span>
          <span id="statsCurrent"></span>
          <span id="followDebug"></span>
        </div>
        <canvas id="sparkline" width="500" height="34"></canvas>
        <div id="eventTooltip" class="event-tooltip"></div>
      </div>
    </div>

    <div class="viz">
      <div id="urdf3dLayer" class="urdf3d-layer"></div>
      <canvas id="canvas"></canvas>
      <div class="legend">
        <h4 id="legendTitle">Intensity + XY Direction</h4>
        <div class="scale"></div>
        <div class="scale-label"><span>0</span><span>1</span></div>
      </div>
      <div class="hint" id="hintText"></div>
    </div>
  </div>

  <script type="module">
    import { drawGridMode } from "./js/render/grid.js";
    import { createUrdfMeshRenderer } from "./js/render/urdf_mesh_renderer.js";
    import { forceColor as forceColorCore, forceColorRgb, drawArrowCanvas } from "./js/render/primitives.js";
    import { createAppState } from "./js/core/app_state.js";
    import { createRosbridgeClient } from "./js/core/rosbridge_client.js";
    import { buildRuntimeConfig } from "./js/core/runtime_config.js";
    import { createUiFeedback } from "./js/core/ui_feedback.js";
    import { updateSmoothedVectors as updateSmoothedVectorsCore } from "./js/core/vector_smoothing.js";

    (() => {
      const runtimeConfig = buildRuntimeConfig(window);
      const {
        wsCandidates,
        topic,
        topicNs,
        xelaRobotDescriptionTopic,
        xelaTfTopic,
        xelaTfStaticTopic,
        xelaRobotDescriptionService,
        robotRobotDescriptionTopic,
        robotTfTopic,
        robotTfStaticTopic,
        robotRobotDescriptionService,
        robotModelFixedFrame,
        defaultFixedFrame,
        followCamForwardDistance,
        followCamHeightOffset,
        followCamLookAhead,
        followCamForwardSign,
      } = runtimeConfig;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const urdf3dLayer = document.getElementById("urdf3dLayer");
      const statusDot = document.getElementById("statusDot");
      const statusText = document.getElementById("statusText");
      const statusLine = document.getElementById("statusLine");
      const modeInfo = document.getElementById("modeInfo");
      const gridBtn = document.getElementById("gridBtn");
      const xelaBtn = document.getElementById("xelaBtn");
      const robotBtn = document.getElementById("robotBtn");
      const vectorBtn = document.getElementById("vectorBtn");
      const followBtn = document.getElementById("followBtn");
      const analysisBtn = document.getElementById("analysisBtn");
      const win10Btn = document.getElementById("win10Btn");
      const win30Btn = document.getElementById("win30Btn");
      const win60Btn = document.getElementById("win60Btn");
      const pauseBtn = document.getElementById("pauseBtn");
      const statsRow = document.getElementById("statsRow");
      const statsText = document.getElementById("statsText");
      const statsCurrent = document.getElementById("statsCurrent");
      const sparkline = document.getElementById("sparkline");
      const sparkCtx = sparkline?.getContext("2d");
      const eventTooltip = document.getElementById("eventTooltip");
      const followDebug = document.getElementById("followDebug");
      const briefStats = document.getElementById("briefStats");
      const topicInfo = document.getElementById("topicInfo");
      const hintText = document.getElementById("hintText");
      const legendTitle = document.getElementById("legendTitle");
      const reconnectBtn = document.getElementById("reconnectBtn");

      topicInfo.textContent = `${topic} | xela:${xelaTfTopic} robot:${robotTfTopic} via ${wsCandidates.join(" | ")}`;

      const state = createAppState(runtimeConfig);
      state.gridVectorMode = "xy";
      state.urdf3dVisible = false;
      state.urdfRenderFailSinceMs = 0;
      const timelineState = {
        samplePeriodMs: 100,
        windowMs: 30000,
        lastSampleMs: 0,
        paused: false,
        pausedNowMs: 0,
        points: [],
        events: [],
        lastEventStamp: NaN,
        lastEventKey: "",
      };
      const hoverState = {
        inside: false,
        x: 0,
        y: 0,
      };
      const analysisState = {
        visible: true,
      };
      const analysisEventState = {
        contactThreshold: 0.14,
        lastContactActive: false,
        lastSlipActive: false,
        lastSlipTriggerCount: NaN,
        currentPhase: "",
      };
      const followCamState = {
        enabled: false,
        manualOrbitActive: false,
        captureViewOnNextUpdate: false,
        // AH tip modules: thumb tip (03), index tip (13).
        tipModule03Regex: /_[01]_03_/,
        tipModule13Regex: /_[01]_13_/,
        tipModule51Regex: /_[01]_51_/,
        tipModule52Regex: /_[01]_52_/,
        tipModule53Regex: /_[01]_53_/,
        forwardSign: followCamForwardSign,
        forwardDistance: followCamForwardDistance,
        heightOffset: followCamHeightOffset,
        lookAhead: followCamLookAhead,
        lookUp: 0.0,
        positionLerp: 0.24,
        targetLerp: 0.26,
        targetBaseLerp: 0.30,
        forwardLerp: 0.22,
        maxCamStep: 0.030,
        maxTargetStep: 0.024,
        tipFallbackDistance: 0.045,
        minPosDeadband: 0.0001,
        minForwardDeg: 0.8,
        jumpRejectDist: 0.16,
        jumpRejectLimit: 2,
        jumpRejectCount: 0,
        filteredTargetBase: null,
        filteredForward: null,
        lastCameraGoal: null,
        lastTargetGoal: null,
        userCameraOffsetLocal: null,
        userTargetOffsetLocal: null,
        snapOnEnable: false,
        debugText: "",
        debugLastUpdateMs: 0.0,
        debugUpdatePeriodMs: 120.0,
      };
      let lastStatsCurrentText = "";
      const uiFeedback = createUiFeedback({
        state,
        statusTextEl: statusText,
        statusDotEl: statusDot,
        hintTextEl: hintText,
        modeInfoEl: modeInfo,
      });
      setTimelineWindowMs(30000);
      setTimelinePaused(false, performance.now());
      setAnalysisVisible(false);

      function safeErrorText(reason) {
        if (!reason) return "unknown";
        if (typeof reason === "string") return reason;
        if (reason && typeof reason.message === "string" && reason.message.length > 0) {
          return reason.message;
        }
        try {
          return JSON.stringify(reason);
        } catch (_) {
          return String(reason);
        }
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function formatVec3(vec) {
        if (!vec) return "[-,-,-]";
        return `[${vec.x.toFixed(3)},${vec.y.toFixed(3)},${vec.z.toFixed(3)}]`;
      }

      function updateFollowDebugUi() {
        if (!followDebug) return;
        if (state.uiMode === "robot" && followCamState.enabled && followCamState.debugText) {
          followDebug.textContent = followCamState.debugText;
          followDebug.title = followCamState.debugText;
          return;
        }
        followDebug.textContent = "";
        followDebug.title = "";
      }

      function setFollowDebugText(text) {
        const next = String(text || "");
        if (followCamState.debugText === next) {
          return;
        }
        followCamState.debugText = next;
        updateFollowDebugUi();
      }

      function setFollowDebugTextThrottled(nowMs, text) {
        if ((nowMs - followCamState.debugLastUpdateMs) < followCamState.debugUpdatePeriodMs) {
          return;
        }
        followCamState.debugLastUpdateMs = nowMs;
        setFollowDebugText(text);
      }

      function syncSparkCanvasSize() {
        if (!sparkline) return;
        const w = Math.max(140, Math.round(sparkline.clientWidth || 0));
        const h = Math.max(24, Math.round(sparkline.clientHeight || 0));
        if (sparkline.width !== w || sparkline.height !== h) {
          sparkline.width = w;
          sparkline.height = h;
        }
      }

      function setAnalysisVisible(visible) {
        analysisState.visible = Boolean(visible);
        if (statsRow) {
          statsRow.style.display = analysisState.visible ? "" : "none";
        }
        analysisBtn?.classList.toggle("active", analysisState.visible);
        if (!analysisState.visible) {
          setEventTooltipVisible(false);
        }
      }

      function setEventTooltipVisible(visible) {
        if (!eventTooltip) return;
        eventTooltip.style.display = visible ? "block" : "none";
      }

      function getEventMarkerScreenX(nowMs, eventTimeMs) {
        const w = sparkline.width;
        const padX = 3.0;
        const innerW = Math.max(1, w - padX * 2);
        const ageMs = nowMs - eventTimeMs;
        if (ageMs < 0.0 || ageMs > timelineState.windowMs) {
          return NaN;
        }
        return padX + (1.0 - ageMs / timelineState.windowMs) * innerW;
      }

      function findNearestEventForHover(nowMs, mouseX) {
        if (!timelineState.events.length) return null;
        let nearest = null;
        let bestDist = Number.POSITIVE_INFINITY;
        for (const evt of timelineState.events) {
          const x = getEventMarkerScreenX(nowMs, evt.t);
          if (!Number.isFinite(x)) continue;
          const d = Math.abs(mouseX - x);
          if (
            d < bestDist ||
            (Math.abs(d - bestDist) < 0.5 && (evt.priority || 0) > ((nearest && nearest.priority) || 0))
          ) {
            bestDist = d;
            nearest = { ...evt, x };
          }
        }
        if (!nearest || bestDist > 12.0) return null;
        return nearest;
      }

      function updateEventTooltip(nowMs) {
        if (!eventTooltip || !sparkline || !hoverState.inside || !analysisState.visible) {
          setEventTooltipVisible(false);
          return;
        }
        const evt = findNearestEventForHover(nowMs, hoverState.x);
        if (!evt) {
          setEventTooltipVisible(false);
          return;
        }

        const ageSec = Math.max(0.0, (nowMs - evt.t) / 1000.0);
        const lines = [];
        lines.push(`${evt.label} (${evt.eventName || "event"})`);
        if (evt.phase) lines.push(`phase: ${evt.phase}`);
        if (evt.source) lines.push(`source: ${evt.source}`);
        if (evt.note) lines.push(`note: ${evt.note}`);
        lines.push(`age: ${ageSec.toFixed(2)}s`);
        eventTooltip.textContent = lines.join("\n");

        const left = Math.min(
          Math.max(4.0, evt.x + 10.0),
          Math.max(4.0, (sparkline.clientWidth || 300) - 210.0),
        );
        const top = Math.max(4.0, hoverState.y - 38.0);
        eventTooltip.style.left = `${left}px`;
        eventTooltip.style.top = `${top}px`;
        setEventTooltipVisible(true);
      }

      function setTimelineWindowMs(ms) {
        timelineState.windowMs = Math.max(5000, Number(ms) || 30000);
        win10Btn?.classList.toggle("active", timelineState.windowMs === 10000);
        win30Btn?.classList.toggle("active", timelineState.windowMs === 30000);
        win60Btn?.classList.toggle("active", timelineState.windowMs === 60000);
      }

      function getTimelineNowMs(nowMs) {
        return timelineState.paused ? timelineState.pausedNowMs : nowMs;
      }

      function setTimelinePaused(paused, nowMs = performance.now()) {
        timelineState.paused = Boolean(paused);
        if (timelineState.paused) {
          timelineState.pausedNowMs = nowMs;
        } else {
          timelineState.lastSampleMs = nowMs;
        }
        pauseBtn?.classList.toggle("active", timelineState.paused);
        if (pauseBtn) {
          pauseBtn.textContent = timelineState.paused ? "Resume" : "Pause";
        }
      }

      function pruneTimeline(nowMs) {
        const cutoff = nowMs - timelineState.windowMs;
        timelineState.points = timelineState.points.filter((p) => Number.isFinite(p.t) && p.t >= cutoff);
        timelineState.events = timelineState.events.filter((e) => Number.isFinite(e.t) && e.t >= cutoff);
      }

      function extractModuleIdFromFrame(frameId) {
        const normalized = String(frameId || "").toLowerCase();
        if (!normalized) return "";
        const patterns = [
          /(?:^|_)base_x_taxel_(?:\d+_)?(\d{1,2})(?:_|$)/,
          /(?:^|_)x_taxel_(?:\d+_)?(\d{1,2})(?:_|$)/,
          /(?:^|_)base_x_base_(?:\d+_)?(\d{1,2})(?:_|$)/,
          /(?:^|_)x_base_(?:\d+_)?(\d{1,2})(?:_|$)/,
          /(?:^|_)module_(\d{1,2})(?:_|$)/,
        ];
        for (const pattern of patterns) {
          const match = normalized.match(pattern);
          if (match && match[1]) {
            return match[1].padStart(2, "0").slice(-2);
          }
        }
        return "";
      }

      function computeAnalysisTelemetry(payload) {
        const points = Array.isArray(payload?.urdf?.points)
          ? payload.urdf.points
          : (Array.isArray(payload?.grid?.points) ? payload.grid.points : []);
        if (!points.length) {
          return null;
        }
        let normSum = 0.0;
        let normCount = 0;
        let fzSum = 0.0;
        let activeCount = 0;
        let tip03Max = Number.NEGATIVE_INFINITY;
        let tip13Max = Number.NEGATIVE_INFINITY;
        for (const p of points) {
          const norm = Number(p?.norm);
          const fz = Number(p?.fz);
          if (Number.isFinite(norm)) {
            normSum += norm;
            normCount += 1;
            if (norm >= 0.12) {
              activeCount += 1;
            }
          }
          if (Number.isFinite(fz)) {
            fzSum += fz;
          }
          const moduleId = extractModuleIdFromFrame(p?.frame_id);
          if (moduleId === "03" && Number.isFinite(norm)) {
            tip03Max = Math.max(tip03Max, norm);
          } else if (moduleId === "13" && Number.isFinite(norm)) {
            tip13Max = Math.max(tip13Max, norm);
          }
        }
        const normMean = normCount > 0 ? normSum / normCount : NaN;
        return {
          pointCount: points.length,
          normMean,
          fzSum,
          activeCount,
          tip03Norm: Number.isFinite(tip03Max) ? tip03Max : NaN,
          tip13Norm: Number.isFinite(tip13Max) ? tip13Max : NaN,
        };
      }

      function sampleTimeline(telemetry, nowMs) {
        if (!telemetry || !sparkCtx) return;
        if (timelineState.paused) return;
        if ((nowMs - timelineState.lastSampleMs) < timelineState.samplePeriodMs) return;
        timelineState.points.push({
          t: nowMs,
          normMean: Number(telemetry.normMean),
          fzSum: Number(telemetry.fzSum),
          tip03Norm: Number(telemetry.tip03Norm),
          tip13Norm: Number(telemetry.tip13Norm),
        });
        timelineState.lastSampleMs = nowMs;
      }

      function classifyAhEventMarker(eventName, options = {}) {
        const normalized = String(eventName || "event").trim().toLowerCase();
        const kindHint = String(options.kind || "").trim().toLowerCase();
        const explicit = Boolean(options.explicit);
        const priorityBase = explicit ? 100 : 0;

        if (kindHint === "contact" || normalized.includes("contact")) {
          return { label: "CONTACT", kind: "contact", tag: "C", explicit, priority: priorityBase + 20 };
        }
        if (
          kindHint === "release" ||
          normalized === "contact_released" ||
          normalized.includes("release") ||
          normalized.includes("open")
        ) {
          return { label: "RELEASE", kind: "release", tag: "R", explicit, priority: priorityBase + 18 };
        }
        if (kindHint === "slip" || normalized === "slip_warning" || normalized === "slip_active") {
          return { label: "SLIP_WARNING", kind: "slip", tag: "S", explicit, priority: priorityBase + 30 };
        }
        if (
          kindHint === "recovery" ||
          normalized.includes("recover") ||
          normalized.includes("abort") ||
          normalized.includes("failure")
        ) {
          return { label: String(eventName || "recovery").toUpperCase(), kind: "explicit-recovery", tag: "!", explicit, priority: priorityBase + 26 };
        }
        if (kindHint === "success" || normalized.includes("complete") || normalized.includes("success")) {
          return { label: String(eventName || "complete").toUpperCase(), kind: "explicit-success", tag: "D", explicit, priority: priorityBase + 24 };
        }
        if (kindHint === "grasp" || normalized.includes("grasp") || normalized.includes("pinch") || normalized.includes("force")) {
          return { label: String(eventName || "grasp").toUpperCase(), kind: "explicit-grasp", tag: "G", explicit, priority: priorityBase + 22 };
        }
        if (
          kindHint === "system" ||
          normalized.includes("impedance") ||
          normalized.includes("slip_reflex") ||
          normalized.includes("filter") ||
          normalized.includes("target_force")
        ) {
          return { label: String(eventName || "system").toUpperCase(), kind: "explicit-system", tag: "T", explicit, priority: priorityBase + 16 };
        }
        if (kindHint === "motion" || normalized.includes("approach") || normalized.includes("retreat") || normalized.includes("home")) {
          return { label: String(eventName || "motion").toUpperCase(), kind: "explicit-motion", tag: normalized.includes("home") ? "H" : "M", explicit, priority: priorityBase + 14 };
        }
        if (explicit) {
          return { label: String(eventName || "event").toUpperCase(), kind: "explicit", tag: "E", explicit, priority: priorityBase + 12 };
        }
        return { label: String(eventName || "event").toUpperCase(), kind: "event", tag: "E", explicit, priority: 10 };
      }

      function normalizePhaseName(phase) {
        return String(phase || "").trim().toLowerCase();
      }

      function isPinchInferencePhase(phase) {
        const normalized = normalizePhaseName(phase);
        return normalized.includes("grasp") || normalized.includes("pinch");
      }

      function hasNearbyExplicitEvent(eventTimeMs, windowMs = 450.0) {
        return timelineState.events.some(
          (evt) =>
            evt.explicit &&
            Number.isFinite(evt.t) &&
            Math.abs(evt.t - eventTimeMs) <= windowMs,
        );
      }

      function registerAnalysisEvent(eventName, nowMs, options = {}) {
        if (timelineState.paused) return null;
        const marker = classifyAhEventMarker(eventName, options);
        const rawStamp = Number(options.stamp);
        const eventKey = Number.isFinite(rawStamp)
          ? `${eventName}|${rawStamp.toFixed(3)}`
          : `${eventName}|${Math.round(nowMs)}|${String(options.note || "")}`;
        if (eventKey === timelineState.lastEventKey) {
          return null;
        }
        timelineState.lastEventKey = eventKey;
        if (Number.isFinite(rawStamp)) {
          timelineState.lastEventStamp = rawStamp;
        }

        const age = Number(options.eventAgeMs);
        const eventTime = Number.isFinite(age) && age >= 0.0 ? (nowMs - age) : nowMs;
        if (marker.explicit) {
          timelineState.events = timelineState.events.filter(
            (evt) => evt.explicit || !Number.isFinite(evt.t) || Math.abs(evt.t - eventTime) > 450.0,
          );
        }
        timelineState.events.push({
          t: eventTime,
          label: marker.label,
          kind: marker.kind,
          tag: marker.tag,
          explicit: marker.explicit,
          priority: marker.priority,
          eventName: String(eventName || ""),
          phase: String(options.phase || ""),
          note: String(options.note || ""),
          source: String(options.source || ""),
        });
        return marker;
      }

      function ingestAnalysisEvents(payload, telemetry, nowMs) {
        if (!analysisState.visible) return;
        const explicitGraspEvent = payload?.meta?.grasp_event;
        if (explicitGraspEvent && typeof explicitGraspEvent === "object") {
          const explicitEventName =
            typeof explicitGraspEvent.event === "string" && explicitGraspEvent.event.trim()
              ? explicitGraspEvent.event.trim()
              : "grasp_event";
          const explicitPhase = String(explicitGraspEvent.phase || "");
          if (explicitPhase.trim()) {
            analysisEventState.currentPhase = explicitPhase;
          }
          registerAnalysisEvent(explicitEventName, nowMs, {
            stamp: Number(explicitGraspEvent.stamp),
            eventAgeMs: Number(payload?.meta?.grasp_event_age_ms),
            source: String(explicitGraspEvent.source || "objective"),
            phase: explicitPhase,
            kind: String(explicitGraspEvent.kind || ""),
            note: String(explicitGraspEvent.note || ""),
            explicit: true,
          });
        }

        const tip03 = Number(telemetry?.tip03Norm);
        const tip13 = Number(telemetry?.tip13Norm);
        const contactActive =
          Number.isFinite(tip03) &&
          Number.isFinite(tip13) &&
          tip03 >= analysisEventState.contactThreshold &&
          tip13 >= analysisEventState.contactThreshold;
        const allowContactInference = isPinchInferencePhase(analysisEventState.currentPhase);

        if (!allowContactInference) {
          analysisEventState.lastContactActive = false;
        }

        if (allowContactInference && contactActive && !analysisEventState.lastContactActive) {
          if (!hasNearbyExplicitEvent(nowMs)) {
            registerAnalysisEvent("contact_detected", nowMs, {
              note: `tip03=${tip03.toFixed(3)} tip13=${tip13.toFixed(3)}`,
              source: "taxel",
              phase: analysisEventState.currentPhase || "pinch",
            });
          }
        } else if (allowContactInference && !contactActive && analysisEventState.lastContactActive) {
          if (!hasNearbyExplicitEvent(nowMs)) {
            registerAnalysisEvent("contact_released", nowMs, {
              source: "taxel",
              phase: analysisEventState.currentPhase || "release",
            });
          }
        }
        if (allowContactInference) {
          analysisEventState.lastContactActive = contactActive;
        }

        const slipMeta = payload?.meta?.slip;
        if (!slipMeta || typeof slipMeta !== "object") {
          analysisEventState.lastSlipActive = false;
          return;
        }

        const slipActive = Boolean(slipMeta.active || slipMeta.reflex_output_active);
        const triggerCount = Number(slipMeta.trigger_count);
        const confidence = Number(slipMeta.confidence);
        const slipAgeMs = Number(payload?.meta?.slip_age_ms);
        const mode = typeof slipMeta.slip_mode === "string" ? slipMeta.slip_mode : "";

        const triggerCountChanged =
          Number.isFinite(triggerCount) &&
          (!Number.isFinite(analysisEventState.lastSlipTriggerCount) ||
            triggerCount > analysisEventState.lastSlipTriggerCount);
        if (triggerCountChanged || (slipActive && !analysisEventState.lastSlipActive)) {
          if (!hasNearbyExplicitEvent(nowMs)) {
            const note = Number.isFinite(confidence) ? `confidence=${confidence.toFixed(3)}` : "";
            registerAnalysisEvent("slip_warning", nowMs, {
              stamp: Number.isFinite(triggerCount) ? triggerCount : Number.NaN,
              eventAgeMs: slipAgeMs,
              source: "xela_atag_slip_detector",
              phase: mode,
              note,
            });
          }
        }
        analysisEventState.lastSlipActive = slipActive;
        if (Number.isFinite(triggerCount)) {
          analysisEventState.lastSlipTriggerCount = triggerCount;
        }
      }

      function getSeriesRange(values) {
        const finite = values.filter((v) => Number.isFinite(v));
        if (finite.length === 0) {
          return null;
        }
        const min = Math.min(...finite);
        const max = Math.max(...finite);
        if (Math.abs(max - min) < 1e-9) {
          const base = Math.max(1e-6, Math.abs(max) * 0.2);
          return { min: min - base, max: max + base };
        }
        return { min, max };
      }

      function drawTimelineSeries(nowMs, key, color) {
        if (!sparkCtx || timelineState.points.length === 0) return false;
        const values = timelineState.points.map((p) => Number(p[key]));
        const rangeInfo = getSeriesRange(values);
        if (!rangeInfo) return false;

        const w = sparkline.width;
        const h = sparkline.height;
        const padX = 3.0;
        const padY = 4.0;
        const innerW = Math.max(1, w - padX * 2);
        const innerH = Math.max(1, h - padY * 2);
        const range = Math.max(1e-9, rangeInfo.max - rangeInfo.min);

        sparkCtx.strokeStyle = color;
        sparkCtx.lineWidth = 1.5;
        sparkCtx.beginPath();
        let penDown = false;
        for (const p of timelineState.points) {
          const raw = Number(p[key]);
          if (!Number.isFinite(raw)) {
            penDown = false;
            continue;
          }
          const ageMs = nowMs - p.t;
          if (ageMs < 0.0 || ageMs > timelineState.windowMs) {
            continue;
          }
          const x = padX + (1.0 - ageMs / timelineState.windowMs) * innerW;
          const y = padY + (1.0 - (raw - rangeInfo.min) / range) * innerH;
          if (!penDown) {
            sparkCtx.moveTo(x, y);
            penDown = true;
          } else {
            sparkCtx.lineTo(x, y);
          }
        }
        sparkCtx.stroke();
        return true;
      }

      function drawEventMarkers(nowMs) {
        if (!sparkCtx || timelineState.events.length === 0) return;
        const w = sparkline.width;
        const h = sparkline.height;
        const padX = 3.0;
        const innerW = Math.max(1, w - padX * 2);
        const drawEvents = timelineState.events
          .slice()
          .sort((a, b) => ((a.priority || 0) - (b.priority || 0)) || (a.t - b.t));
        for (const evt of drawEvents) {
          const ageMs = nowMs - evt.t;
          if (ageMs < 0.0 || ageMs > timelineState.windowMs) {
            continue;
          }
          const x = padX + (1.0 - ageMs / timelineState.windowMs) * innerW;
          const color = evt.kind === "contact"
            ? "#22d3ee"
            : (evt.kind === "release"
              ? "#94a3b8"
              : (evt.kind === "slip"
                ? "#ef4444"
                : (evt.kind === "explicit-motion"
                  ? "#60a5fa"
                  : (evt.kind === "explicit-grasp"
                    ? "#f59e0b"
                    : (evt.kind === "explicit-system"
                      ? "#14b8a6"
                      : (evt.kind === "explicit-recovery"
                        ? "#f97316"
                        : (evt.kind === "explicit-success" ? "#22c55e" : "#cbd5e1")))))));
          sparkCtx.strokeStyle = color;
          sparkCtx.lineWidth = evt.explicit ? 1.8 : (evt.kind === "slip" ? 1.4 : 1.0);
          sparkCtx.beginPath();
          sparkCtx.moveTo(x, 12.0);
          sparkCtx.lineTo(x, h - 2.0);
          sparkCtx.stroke();

          const tag = String(evt.tag || "E").slice(0, 1).toUpperCase();
          sparkCtx.fillStyle = color;
          sparkCtx.fillRect(x + 1.0, 12.0, 8.0, 8.0);
          sparkCtx.fillStyle = "#0b1222";
          sparkCtx.font = "8px ui-monospace, SFMono-Regular, Menlo, monospace";
          sparkCtx.fillText(tag, x + 3.0, 18.0);
        }
      }

      function drawSparkline(nowMs) {
        if (!sparkCtx) return;
        syncSparkCanvasSize();
        sparkCtx.clearRect(0, 0, sparkline.width, sparkline.height);
        sparkCtx.fillStyle = "#0a1627";
        sparkCtx.fillRect(0, 0, sparkline.width, sparkline.height);
        sparkCtx.font = "10px ui-monospace, SFMono-Regular, Menlo, monospace";
        sparkCtx.fillStyle = "#f59e0b";
        sparkCtx.fillText("norm_mean", 5, 10);
        sparkCtx.fillStyle = "#22d3ee";
        sparkCtx.fillText("fz_sum", 70, 10);
        sparkCtx.fillStyle = "#94a3b8";
        sparkCtx.fillText(
          `tw=${Math.round(timelineState.windowMs / 1000)}s${timelineState.paused ? " paused" : ""}`,
          Math.max(120, sparkline.width - 120),
          10,
        );

        pruneTimeline(nowMs);
        const hasNorm = timelineState.points.some((p) => Number.isFinite(p.normMean));
        const hasFz = timelineState.points.some((p) => Number.isFinite(p.fzSum));
        if (!hasNorm && !hasFz) {
          drawEventMarkers(nowMs);
          sparkCtx.fillStyle = "#64748b";
          sparkCtx.fillText("no telemetry", Math.max(72, sparkline.width - 92), 10);
          updateEventTooltip(nowMs);
          return;
        }
        drawTimelineSeries(nowMs, "normMean", "#f59e0b");
        drawTimelineSeries(nowMs, "fzSum", "#22d3ee");
        drawEventMarkers(nowMs);
        updateEventTooltip(nowMs);
      }

      function normalizeFrameId(frameId) {
        if (!frameId) return "";
        return String(frameId).replace(/^\/+/, "").trim();
      }

      function getUrdfSourceForUiMode() {
        return state.uiMode === "robot" ? "robot" : "xela";
      }

      function getActiveUrdfSource() {
        return state.urdfSources[getUrdfSourceForUiMode()];
      }

      function bindActiveUrdfSourceToMesh(force = false) {
        const src = getActiveUrdfSource();
        const m = state.urdfMesh;
        const sourceChanged = m.boundSourceName !== src.name;
        const descChanged = m.boundRobotDescriptionVersion !== src.robotDescriptionVersion;
        if (force || sourceChanged || descChanged) {
          m.boundSourceName = src.name;
          m.boundRobotDescriptionVersion = src.robotDescriptionVersion;
          m.robotDescriptionXml = src.robotDescriptionXml;
          m.robotBuilt = false;
          m.failReason = "";
          m.autoFrameDone = false;
          m.markerMap.clear();
          m.markerGroup?.clear?.();
          m.linkGroups.clear();
          m.linkModuleMap.clear();
          m.linkUrdfColorMap.clear();
          m.linkMeshMap.clear();
          m.activeModuleIds = new Set();
          m.lastHighlightSignature = "";
          m.robotGroup?.clear?.();
        }
        m.tfEdges = src.tfEdges;
        m.frameAliasCache = src.frameAliasCache;
      }

      function getFrameLeafName(frame) {
        const text = normalizeFrameId(frame);
        if (!text) return "";
        const parts = text.split(/[/:]/).filter(Boolean);
        return parts.length ? parts[parts.length - 1] : text;
      }

      function resolveChildFrameAlias(frame) {
        const m = state.urdfMesh;
        const clean = normalizeFrameId(frame);
        if (!clean) return "";
        if (m.tfEdges.has(clean)) {
          return clean;
        }
        if (m.frameAliasCache.has(clean)) {
          return m.frameAliasCache.get(clean);
        }
        const leaf = getFrameLeafName(clean);
        let match = "";
        for (const key of m.tfEdges.keys()) {
          const keyLeaf = getFrameLeafName(key);
          if (keyLeaf !== leaf) continue;
          if (!match) {
            match = key;
          } else if (match !== key) {
            m.frameAliasCache.set(clean, "");
            return "";
          }
        }
        m.frameAliasCache.set(clean, match || "");
        return match || "";
      }

      function selectFixedFrame(activeSource, payloadFixedFrame) {
        const m = state.urdfMesh;
        const payloadFixed = normalizeFrameId(payloadFixedFrame || "");
        const childSet = new Set(m.tfEdges.keys());
        const parentSet = new Set();
        const childrenByParent = new Map();
        for (const [child, edge] of m.tfEdges.entries()) {
          const parent = normalizeFrameId(edge.parent);
          if (!parent) continue;
          parentSet.add(parent);
          if (!childrenByParent.has(parent)) {
            childrenByParent.set(parent, []);
          }
          childrenByParent.get(parent).push(normalizeFrameId(child));
        }
        const frameExists = (name) => {
          if (!name) return false;
          return childSet.has(name) || parentSet.has(name);
        };

        const preferred = [];
        if (state.uiMode === "robot") {
          const rootLink = normalizeFrameId(activeSource?.robotRootLink || "");
          if (rootLink) {
            const aliasedRoot = resolveChildFrameAlias(rootLink) || rootLink;
            preferred.push(aliasedRoot);
          }
          if (robotModelFixedFrame) preferred.push(robotModelFixedFrame);
          if (payloadFixed) preferred.push(payloadFixed);
          preferred.push("world", "base_link");
        } else {
          if (payloadFixed) preferred.push(payloadFixed);
          preferred.push(defaultFixedFrame);
        }
        for (const name of preferred) {
          const clean = normalizeFrameId(name);
          if (frameExists(clean)) return clean;
        }

        const roots = [];
        for (const p of parentSet) {
          if (!childSet.has(p)) roots.push(p);
        }
        if (roots.length > 0) {
          const memo = new Map();
          const visit = new Set();
          const scoreRoot = (root) => {
            if (memo.has(root)) return memo.get(root);
            if (visit.has(root)) return 0;
            visit.add(root);
            let total = 1;
            const children = childrenByParent.get(root) || [];
            for (const child of children) {
              if (child) total += scoreRoot(child);
            }
            visit.delete(root);
            memo.set(root, total);
            return total;
          };
          roots.sort((a, b) => scoreRoot(b) - scoreRoot(a) || a.localeCompare(b));
          return roots[0];
        }

        if (childSet.size > 0) {
          return Array.from(childSet).sort()[0];
        }
        return payloadFixed || normalizeFrameId(defaultFixedFrame || "world") || "world";
      }

      function onFollowOrbitInteraction(interactionType) {
        if (!followCamState.enabled || state.uiMode !== "robot") {
          return;
        }
        if (interactionType === "start" || interactionType === "pointerdown") {
          followCamState.manualOrbitActive = true;
          followCamState.captureViewOnNextUpdate = true;
          return;
        }
        if (interactionType === "end") {
          followCamState.manualOrbitActive = false;
          followCamState.captureViewOnNextUpdate = true;
          return;
        }
        if (interactionType === "wheel") {
          followCamState.captureViewOnNextUpdate = true;
        }
      }

      function setFollowCamEnabled(enabled) {
        const next = Boolean(enabled);
        if (followCamState.enabled === next) {
          return;
        }
        followCamState.enabled = next;
        followCamState.manualOrbitActive = false;
        followCamState.captureViewOnNextUpdate = false;
        followCamState.jumpRejectCount = 0;
        followCamState.filteredTargetBase = null;
        followCamState.filteredForward = null;
        followCamState.lastCameraGoal = null;
        followCamState.lastTargetGoal = null;
        followCamState.userCameraOffsetLocal = null;
        followCamState.userTargetOffsetLocal = null;
        followCamState.snapOnEnable = next;
        followCamState.debugLastUpdateMs = 0.0;
        if (next) {
          setHintText("FollowCam enabled: thumb/index fingertip tracking.");
          setFollowDebugText("fc waiting: tip frames 03/13...");
        } else {
          setHintText("FollowCam disabled: RobotModel fixed orbit mode.");
          setFollowDebugText("");
          if (state.uiMode === "robot") {
            const m = state.urdfMesh;
            if (m.ready) {
              m.autoFrameDone = false;
              autoFrameUrdfMeshCamera(true);
            }
          }
        }
        applyOrbitProfileForMode();
        updateModeButtons();
      }

      function computeModuleCenterFromTf(points, moduleId, fixedFrame, strictCache, strictVisiting) {
        let x = 0.0;
        let y = 0.0;
        let z = 0.0;
        let n = 0;
        const seenFrames = new Set();
        for (const p of points) {
          const idFromFrame = extractModuleIdFromName(p?.frame_id);
          if (idFromFrame !== moduleId) continue;
          const rawFrame = normalizeFrameId(p?.frame_id);
          if (!rawFrame) continue;
          const frame = resolveChildFrameAlias(rawFrame) || rawFrame;
          if (!frame || seenFrames.has(frame)) continue;
          seenFrames.add(frame);
          let tf = resolveFrameToFixed(frame, fixedFrame, strictCache, strictVisiting, false);
          if (!tf) {
            tf = resolveFrameToFixed(frame, fixedFrame, strictCache, strictVisiting, true);
          }
          if (!tf) continue;
          x += tf.tx;
          y += tf.ty;
          z += tf.tz;
          n += 1;
        }
        if (n <= 0) return null;
        return { x: x / n, y: y / n, z: z / n };
      }

      function updateFollowCamera(nowMs) {
        if (!followCamState.enabled || state.uiMode !== "robot") {
          return;
        }
        const m = state.urdfMesh;
        if (!m.ready || !m.controls || !m.camera || !m.THREE) {
          setFollowDebugTextThrottled(nowMs, "fc waiting: URDF mesh renderer not ready");
          return;
        }
        const fixedFrame = normalizeFrameId(m.fixedFrame || defaultFixedFrame || "world");
        const strictCache = new Map();
        const strictVisiting = new Set();
        const points = Array.isArray(state.payload?.urdf?.points) ? state.payload.urdf.points : [];
        const tip03 = computeModuleCenterFromTf(points, "03", fixedFrame, strictCache, strictVisiting);
        const tip13 = computeModuleCenterFromTf(points, "13", fixedFrame, strictCache, strictVisiting);
        const palm51 = computeModuleCenterFromTf(points, "51", fixedFrame, strictCache, strictVisiting);
        const palm52 = computeModuleCenterFromTf(points, "52", fixedFrame, strictCache, strictVisiting);
        const palm53 = computeModuleCenterFromTf(points, "53", fixedFrame, strictCache, strictVisiting);
        if (!tip03 || !tip13) {
          setFollowDebugTextThrottled(nowMs, "fc waiting: tip03/tip13 unresolved");
          return;
        }

        const THREE = m.THREE;
        const tip03Vec = new THREE.Vector3(tip03.x, tip03.y, tip03.z);
        const tip13Vec = new THREE.Vector3(tip13.x, tip13.y, tip13.z);
        const targetBaseRaw = tip03Vec.clone().add(tip13Vec).multiplyScalar(0.5);
        if (
          followCamState.filteredTargetBase &&
          targetBaseRaw.distanceTo(followCamState.filteredTargetBase) > followCamState.jumpRejectDist
        ) {
          followCamState.jumpRejectCount += 1;
          if (followCamState.jumpRejectCount < followCamState.jumpRejectLimit) {
            return;
          }
          followCamState.filteredTargetBase = targetBaseRaw.clone();
          followCamState.filteredForward = null;
          followCamState.lastCameraGoal = null;
          followCamState.lastTargetGoal = null;
          followCamState.jumpRejectCount = 0;
        } else {
          followCamState.jumpRejectCount = 0;
        }
        if (!followCamState.filteredTargetBase) {
          followCamState.filteredTargetBase = targetBaseRaw.clone();
        } else {
          const targetBaseDelta = targetBaseRaw.distanceTo(followCamState.filteredTargetBase);
          if (targetBaseDelta >= followCamState.minPosDeadband) {
            followCamState.filteredTargetBase.lerp(targetBaseRaw, followCamState.targetBaseLerp);
          }
        }
        const targetBase = followCamState.filteredTargetBase.clone();
        const worldUp = new THREE.Vector3(0, 0, 1);

        let rawForward = new THREE.Vector3();
        let forwardSource = "tip_span_x_world_up";
        const tipSpan = tip13Vec.clone().sub(tip03Vec);
        rawForward.copy(tipSpan.clone().cross(worldUp));
        if (rawForward.lengthSq() < 1e-8) {
          rawForward = new THREE.Vector3(1, 0, 0);
          forwardSource = "world_x_fallback";
        }

        const palmCenters = [];
        if (palm51) palmCenters.push(new THREE.Vector3(palm51.x, palm51.y, palm51.z));
        if (palm52) palmCenters.push(new THREE.Vector3(palm52.x, palm52.y, palm52.z));
        if (palm53) palmCenters.push(new THREE.Vector3(palm53.x, palm53.y, palm53.z));
        if (palmCenters.length > 0) {
          const palmCenter = palmCenters.reduce(
            (acc, cur) => acc.add(cur),
            new THREE.Vector3(0, 0, 0),
          ).multiplyScalar(1.0 / palmCenters.length);
          const palmToTip = targetBase.clone().sub(palmCenter);
          if (palmToTip.lengthSq() >= 1e-8) {
            rawForward.copy(palmToTip);
            forwardSource = "palm_to_tip";
          }
        }

        rawForward.normalize();
        rawForward.multiplyScalar(followCamState.forwardSign >= 0.0 ? 1.0 : -1.0);
        if (!followCamState.filteredForward) {
          followCamState.filteredForward = rawForward.clone();
        } else {
          const dot = Math.max(-1.0, Math.min(1.0, followCamState.filteredForward.dot(rawForward)));
          const angleDeg = Math.acos(dot) * 180.0 / Math.PI;
          if (angleDeg >= followCamState.minForwardDeg) {
            followCamState.filteredForward.lerp(rawForward, followCamState.forwardLerp).normalize();
          }
        }
        const forward = followCamState.filteredForward;
        let rightBasis = forward.clone().cross(worldUp);
        if (rightBasis.lengthSq() < 1e-8) {
          rightBasis = new THREE.Vector3(1, 0, 0);
        }
        rightBasis.normalize();
        const upBasis = rightBasis.clone().cross(forward).normalize();
        const captureLocalOffset = (worldPos) => {
          const delta = worldPos.clone().sub(targetBase);
          return {
            right: delta.dot(rightBasis),
            up: delta.dot(upBasis),
            forward: delta.dot(forward),
          };
        };
        const applyLocalOffset = (localOffset) => targetBase
          .clone()
          .addScaledVector(rightBasis, localOffset.right)
          .addScaledVector(upBasis, localOffset.up)
          .addScaledVector(forward, localOffset.forward);

        if (followCamState.manualOrbitActive || followCamState.captureViewOnNextUpdate) {
          followCamState.userCameraOffsetLocal = captureLocalOffset(m.camera.position);
          followCamState.userTargetOffsetLocal = captureLocalOffset(m.controls.target);
          followCamState.captureViewOnNextUpdate = false;
          if (followCamState.manualOrbitActive) {
            setFollowDebugTextThrottled(nowMs, "fc manual orbit: tracking paused");
            return;
          }
        }

        let camGoal;
        let targetGoal;
        if (followCamState.userCameraOffsetLocal && followCamState.userTargetOffsetLocal) {
          camGoal = applyLocalOffset(followCamState.userCameraOffsetLocal);
          targetGoal = applyLocalOffset(followCamState.userTargetOffsetLocal);
        } else {
          camGoal = targetBase
            .clone()
            .addScaledVector(forward, followCamState.forwardDistance)
            .addScaledVector(worldUp, followCamState.heightOffset);
          targetGoal = targetBase
            .clone()
            .addScaledVector(forward, -followCamState.lookAhead)
            .addScaledVector(worldUp, followCamState.lookUp);
          if (camGoal.z <= targetGoal.z + 0.01) {
            camGoal.z = targetGoal.z + 0.01;
          }
        }

        setFollowDebugTextThrottled(
          nowMs,
          `fc frame=${fixedFrame} src=${forwardSource} tip03=${formatVec3(tip03Vec)} tip13=${formatVec3(tip13Vec)} fwd=${formatVec3(forward)}`,
        );

        if (followCamState.snapOnEnable) {
          followCamState.lastCameraGoal = camGoal.clone();
          followCamState.lastTargetGoal = targetGoal.clone();
          m.camera.position.copy(camGoal);
          m.controls.target.copy(targetGoal);
          m.controls.update();
          followCamState.snapOnEnable = false;
          return;
        }

        followCamState.lastCameraGoal = camGoal.clone();
        followCamState.lastTargetGoal = targetGoal.clone();
        const nextCam = m.camera.position.clone().lerp(
          followCamState.lastCameraGoal,
          followCamState.positionLerp,
        );
        const camDelta = nextCam.clone().sub(m.camera.position);
        const camStep = camDelta.length();
        if (camStep > followCamState.maxCamStep) {
          camDelta.setLength(followCamState.maxCamStep);
          nextCam.copy(m.camera.position).add(camDelta);
        }
        const nextTarget = m.controls.target.clone().lerp(
          followCamState.lastTargetGoal,
          followCamState.targetLerp,
        );
        const targetDelta = nextTarget.clone().sub(m.controls.target);
        const targetStep = targetDelta.length();
        if (targetStep > followCamState.maxTargetStep) {
          targetDelta.setLength(followCamState.maxTargetStep);
          nextTarget.copy(m.controls.target).add(targetDelta);
        }
        m.camera.position.copy(nextCam);
        m.controls.target.copy(nextTarget);
      }

      function applyOrbitProfileForMode() {
        const m = state.urdfMesh;
        if (!m.ready || !m.controls || !m.camera) return;
        const isRobotMode = state.uiMode === "robot";
        const followEnabled = isRobotMode && followCamState.enabled;

      const URDF_NEUTRAL_LINK_COLOR = 0x6b7280;

      function normalizeModuleId(raw) {
        const digits = String(raw || "").replace(/[^0-9]/g, "");
        if (!digits) return "";
        if (digits.length === 1) return `0${digits}`;
        return digits.slice(-2);
      }

      function extractModuleIdFromName(name) {
        const normalized = normalizeFrameId(name).toLowerCase();
        if (!normalized) return "";
        const patterns = [
          /(?:^|_)base_x_taxel_(?:\d+_)?(\d{1,2})(?:_|$)/,
          /(?:^|_)x_taxel_(?:\d+_)?(\d{1,2})(?:_|$)/,
          /(?:^|_)base_x_base_(?:\d+_)?(\d{1,2})(?:_|$)/,
          /(?:^|_)x_base_(?:\d+_)?(\d{1,2})(?:_|$)/,
          /(?:^|_)module_(\d{1,2})(?:_|$)/,
        ];
        for (const pattern of patterns) {
          const match = normalized.match(pattern);
          if (match && match[1]) {
            return normalizeModuleId(match[1]);
          }
        }
        return "";
      }

      function fallbackModuleColor(moduleId) {
        if (/^0[1-3]$/.test(moduleId)) return 0xf59e0b;  // thumb
        if (/^1[0-3]$/.test(moduleId)) return 0x84cc16;  // index
        if (/^2[0-3]$/.test(moduleId)) return 0x38bdf8;  // middle
        if (/^3[0-3]$/.test(moduleId)) return 0xfb7185;  // ring
        if (/^5[1-3]$/.test(moduleId)) return 0x2dd4bf;  // palm
        return 0x93c5fd;
      }

      function collectEnabledModuleIdsFromUi() {
        const out = new Set();
        for (const [key, enabled] of Object.entries(state.showModules)) {
          if (!enabled) continue;
          if (!/^m\d{2}$/.test(key)) continue;
          out.add(key.slice(1));
        }
        return out;
      }

      function collectVisibleModuleIdsFromPayload(payload) {
        const out = new Set();
        const points = Array.isArray(payload?.urdf?.points) ? payload.urdf.points : [];
        for (const p of points) {
          const moduleId = extractModuleIdFromName(p?.frame_id);
          if (!moduleId) continue;
          out.add(moduleId);
        }
        return out;
      }

      function computeActiveModuleIds(payload) {
        const uiEnabledModules = collectEnabledModuleIdsFromUi();
        const visibleModules = collectVisibleModuleIdsFromPayload(payload);
        if (visibleModules.size > 0) {
          return visibleModules;
        }
        return uiEnabledModules;
      }

      function resolveLinkColorForSelection(linkName) {
        const m = state.urdfMesh;
        const normalizedLinkName = normalizeFrameId(linkName);
        const moduleId =
          m.linkModuleMap.get(normalizedLinkName) ||
          extractModuleIdFromName(normalizedLinkName);
        if (!moduleId) {
          return URDF_NEUTRAL_LINK_COLOR;
        }
        if (!m.activeModuleIds.has(moduleId)) {
          return URDF_NEUTRAL_LINK_COLOR;
        }
        const urdfColor = m.linkUrdfColorMap.get(normalizedLinkName);
        return Number.isInteger(urdfColor) ? urdfColor : fallbackModuleColor(moduleId);
      }

      function refreshUrdfModuleHighlight(payload) {
        const m = state.urdfMesh;
        const activeModules = computeActiveModuleIds(payload);
        const signature = [...activeModules].sort().join(",");
        if (signature === m.lastHighlightSignature) {
          return;
        }
        m.activeModuleIds = activeModules;
        m.lastHighlightSignature = signature;
        urdfMeshRenderer.refreshLinkMaterials(resolveLinkColorForSelection);
      }

      function getLinkMaterial(THREE, linkName, colorOverride = null) {
        const m = state.urdfMesh;
        const color = Number.isInteger(colorOverride)
          ? colorOverride
          : resolveLinkColorForSelection(linkName);
        const key = String(color);
        if (!m.materialCache.has(key)) {
          m.materialCache.set(key, new THREE.MeshStandardMaterial({
            color,
            roughness: 0.72,
            metalness: 0.08,
          }));
        }
        return m.materialCache.get(key);
      }
      const urdfMeshRenderer = createUrdfMeshRenderer({
        state,
        urdf3dLayer,
        normalizeFrameId,
        setHintText,
        safeErrorText,
        applyOrbitProfileForMode,
        getLinkMaterial,
        extractModuleIdFromName,
        onOrbitInteraction: onFollowOrbitInteraction,
      });

      function subscribeRosTopic(topicName, throttleMs = 0, messageType = "") {
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
          return;
        }
        const req = {
          op: "subscribe",
          topic: topicName,
          queue_length: 1,
          throttle_rate: Math.max(0, throttleMs),
        };
        if (messageType) {
          req.type = messageType;
        }
        state.ws.send(JSON.stringify(req));
      }

      function ensureSourceSubscriptions() {
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN || state.sourceTopicSubscribed) {
          return;
        }
        subscribeRosTopic(topic, 0, "std_msgs/msg/String");
        for (const src of Object.values(state.urdfSources)) {
          subscribeRosTopic(src.robotDescriptionTopic, 0, "std_msgs/msg/String");
          subscribeRosTopic(src.tfTopic, 25, "tf2_msgs/msg/TFMessage");
          subscribeRosTopic(src.tfStaticTopic, 0, "tf2_msgs/msg/TFMessage");
          state.sourceByService.set(src.robotDescriptionService, src.name);
        }
        state.sourceTopicSubscribed = true;
      }

      function requestRobotDescriptionViaService(sourceName, force = false) {
        if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
          return;
        }
        const src = state.urdfSources[sourceName];
        if (!src) {
          return;
        }
        if (src.pendingRobotDescriptionService) {
          return;
        }
        if (!force && src.robotDescriptionXml) {
          return;
        }
        const now = performance.now();
        if (!force && now - src.lastRobotDescriptionServiceReqMs < 1000) {
          return;
        }
        src.pendingRobotDescriptionService = true;
        src.lastRobotDescriptionServiceReqMs = now;
        state.sourceByService.set(src.robotDescriptionService, src.name);
        const serviceCallId = `get_desc_${src.name}_${++state.serviceCallSeq}`;
        state.sourceByServiceCallId.set(serviceCallId, src.name);
        state.ws.send(JSON.stringify({
          id: serviceCallId,
          op: "call_service",
          service: src.robotDescriptionService,
          type: "rcl_interfaces/srv/GetParameters",
          args: { names: ["robot_description"] },
        }));
      }
